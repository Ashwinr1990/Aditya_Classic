<h2>Add Utility Bill</h2>
<form>
	<label>Type: 
		<select name="type">
			<option>Electricity</option>
			<option>Water</option>
			<option>Other</option>
		</select>
	</label><br>
	<label>Month: <input type="month" name="month"></label><br>
	<label>Amount: <input type="number" name="amount"></label><br>
	<button type="submit">Add</button>
</form>
