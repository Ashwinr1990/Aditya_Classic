<h2>Common Maintenance Tracker</h2>
<div class="selector-card acmt-card" style="animation: fadeInDown 0.7s cubic-bezier(.4,2,.6,1);">
	<label class="selector-label">
		Month:
		<select class="selector-select" [(ngModel)]="selectedMonth" (change)="onSelectionChange()">
			<option *ngFor="let m of months; let i = index" [value]="i">{{ m }}</option>
		</select>
	</label>
	<label class="selector-label">
		Year:
		<select class="selector-select" [(ngModel)]="selectedYear" (change)="onSelectionChange()">
			<option *ngFor="let y of years" [value]="y">{{ y }}</option>
		</select>
	</label>
	<button class="selector-btn" (click)="addItem()">Add Item</button>
</div>

<div style="overflow-x: auto; animation: fadeInUp 0.7s cubic-bezier(.4,2,.6,1);">
<table class="acmt-table" style="min-width: 600px; animation: fadeIn 0.7s cubic-bezier(.4,2,.6,1);">
	<thead style="background: #1976d2; color: #fff;">
		<tr>
			<th style="padding: 0.75rem; text-align: left;">Item</th>
			<th style="padding: 0.75rem; text-align: right;">Cost (₹)</th>
			<th style="padding: 0.75rem; text-align: center;">Actions</th>
		</tr>
	</thead>
	<tbody>
		<tr *ngFor="let item of items; let idx = index" [hidden]="item.month !== selectedMonth || item.year !== selectedYear">
			<td style="padding: 0.75rem; min-width: 180px;">
				<input type="text" [(ngModel)]="items[idx].desc" (input)="updateItem(idx, 'desc', $event.target.value)" style="width: 100%; padding: 0.25rem; border-radius: 0.5rem; border: 1px solid #ccc;">
			</td>
			<td style="padding: 0.75rem; min-width: 120px; text-align: right;">
				<input type="number" min="0" [(ngModel)]="items[idx].cost" (input)="updateItem(idx, 'cost', $event.target.value)" style="width: 100px; padding: 0.25rem; border-radius: 0.5rem; border: 1px solid #ccc; text-align: right;">
			</td>
			<td style="padding: 0.5rem; text-align: center;">
				<button (click)="removeItem(idx)" style="padding: 0.25rem 1rem; border-radius: 1rem; background: #eee; color: #333; border: none; font-weight: 500; cursor: pointer;">Remove</button>
			</td>
		</tr>
		<tr *ngIf="items.length === 0">
			<td colspan="3" style="padding: 1rem; text-align: center; color: #888;">No items found. Please add items.</td>
		</tr>
	</tbody>
</table>
</div>

<h3 style="margin-top: 3rem;">Total Common Maintenance Cost ({{ months[selectedMonth] }} {{ selectedYear }})</h3>
<table class="acmt-table" style="max-width: 500px; margin-bottom: 2rem; margin-top: 1.5rem; animation: fadeIn 0.7s cubic-bezier(.4,2,.6,1);">
	<thead style="background: #1976d2; color: #fff;">
		<tr>
			<th style="padding: 0.75rem; text-align: left;">Summary</th>
			<th style="padding: 0.75rem; text-align: right;">Total Cost (₹)</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td style="padding: 0.75rem;">All Items</td>
			<td style="padding: 0.75rem; text-align: right;">{{ getTotal() }}</td>
		</tr>
	</tbody>
</table>
