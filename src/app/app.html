<style>
  :host {
    --bright-blue: oklch(51.01% 0.274 263.83);
    --electric-violet: oklch(53.18% 0.28 296.97);
    --french-violet: oklch(47.66% 0.246 305.88);
    --vivid-pink: oklch(69.02% 0.277 332.77);
    --hot-red: oklch(61.42% 0.238 15.34);
    --orange-red: oklch(63.32% 0.24 31.68);

    --gray-900: oklch(19.37% 0.006 300.98);
    --gray-700: oklch(36.98% 0.014 302.71);
    --gray-400: oklch(70.9% 0.015 304.04);

    --red-to-pink-to-purple-vertical-gradient: linear-gradient(
      180deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    --red-to-pink-to-purple-horizontal-gradient: linear-gradient(
      90deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    --pill-accent: var(--bright-blue);

    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1 {
    font-size: 3.125rem;
    color: var(--gray-900);
    font-weight: 500;
    line-height: 100%;
    letter-spacing: -0.125rem;
    margin: 0;
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
  }

  p {
    margin: 0;
    color: var(--gray-700);
  }

  main {
    width: 100%;
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
    box-sizing: inherit;
    position: relative;
  }

  .angular-logo {
    max-width: 9.2rem;
  }

  .content {
    display: flex;
    justify-content: space-around;
    width: 100%;
    max-width: 700px;
    margin-bottom: 3rem;
  }

  .content h1 {
    margin-top: 1.75rem;
  }

  .content p {
    margin-top: 1.5rem;
  }

  .divider {
    width: 1px;
    background: var(--red-to-pink-to-purple-vertical-gradient);
    margin-inline: 0.5rem;
  }

  .pill-group {
    display: flex;
    flex-direction: column;
    align-items: start;
    flex-wrap: wrap;
    gap: 1.25rem;
  }

  .pill {
    display: flex;
    align-items: center;
    --pill-accent: var(--bright-blue);
    background: color-mix(in srgb, var(--pill-accent) 5%, transparent);
    color: var(--pill-accent);
    padding-inline: 0.75rem;
    padding-block: 0.375rem;
    border-radius: 2.75rem;
    border: 0;
    transition: background 0.3s ease;
    font-family: var(--inter-font);
    font-size: 0.875rem;
    font-style: normal;
    font-weight: 500;
    line-height: 1.4rem;
    letter-spacing: -0.00875rem;
    text-decoration: none;
    white-space: nowrap;
  }

  .pill:hover {
    background: color-mix(in srgb, var(--pill-accent) 15%, transparent);
  }

  .pill-group .pill:nth-child(6n + 1) {
    --pill-accent: var(--bright-blue);
  }
  .pill-group .pill:nth-child(6n + 2) {
    --pill-accent: var(--electric-violet);
  }
  .pill-group .pill:nth-child(6n + 3) {
    --pill-accent: var(--french-violet);
  }

  .pill-group .pill:nth-child(6n + 4),
  .pill-group .pill:nth-child(6n + 5),
  .pill-group .pill:nth-child(6n + 6) {
    --pill-accent: var(--hot-red);
  }

  .pill-group svg {
    margin-inline-start: 0.25rem;
  }

  .social-links {
    display: flex;
    align-items: center;
    gap: 0.73rem;
    margin-top: 1.5rem;
  }

  .social-links path {
    transition: fill 0.3s ease;
    fill: var(--gray-400);
  }

  .social-links a:hover svg path {
    fill: var(--gray-900);
  }

  @media screen and (max-width: 650px) {
    .content {
      flex-direction: column;
      width: max-content;
    }

    .divider {
      height: 1px;
      width: 100%;
      background: var(--red-to-pink-to-purple-horizontal-gradient);
      margin-block: 1.5rem;
    }
  }
</style>

<style>
.main-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2.5rem;
  background: #f5f6fa;
  padding: 0.75rem 0 0.5rem 0;
  border-radius: 0 0 1.5rem 1.5rem;
  box-shadow: 0 2px 12px #0002;
  margin-bottom: 2.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.main-nav a {
  color: #1976d2;
  font-size: 1.18rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-decoration: none;
  padding: 0.5rem 1.7rem;
  border-radius: 2rem;
  transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  background: #f5f6fa;
  box-shadow: none;
  position: relative;
}
.main-nav a.active, .main-nav a.router-link-active {
  background: linear-gradient(90deg, #388e3c 0%, #1976d2 100%);

  box-shadow: 0 2px 12px #388e3c33;

.main-nav a:not(.active):hover {

  color: #1976d2;
}
</style>
<style>
/* Mobile nav toggle & overlay for small screens (target ~iPhone 15) */
@media (max-width: 430px) {
  .site-header { padding: 0.9rem 3.5rem 0.9rem 1rem; position: sticky; }
  .nav-toggle {
    display: flex !important;
    position: absolute;
    right: 12px;
    top: 8px;
    z-index: 1102;
    width: 44px;
    height: 44px;
    background: linear-gradient(90deg,#1976d2,#388e3c);
    border-radius: 10rem;
    border: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    color: #fff;
  }
  .nav-toggle .hamburger {
    width: 18px;
    height: 2px;
    background: #fff;
    position: relative;
    display: inline-block;
  }
  .nav-toggle .hamburger::before,
  .nav-toggle .hamburger::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: #fff;
  }
  .nav-toggle .hamburger::before { top: -6px }
  .nav-toggle .hamburger::after { top: 6px }

  .main-nav {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 82%;
    max-width: 360px;
    /* translucent panel so content shows through */
    background: rgba(255,255,255,0.58);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    transform: translateX(-110%);
    transition: transform 320ms cubic-bezier(.2,.9,.2,1);
    box-shadow: 6px 0 28px rgba(0,0,0,0.12);
    padding-top: 4.2rem;
    padding-bottom: 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    align-items: stretch;
    z-index: 1090;
    border-radius: 0 12px 12px 0;
    overflow-y: auto;
    box-sizing: border-box;
  }
  /* dim backdrop */
  .nav-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.36);
    opacity: 0;
    transition: opacity 260ms ease;
    pointer-events: none;
    z-index: 1085;
  }
  .nav-backdrop.show { opacity: 1; pointer-events: auto; }

  /* nav item staggered animation */
  .main-nav a { opacity: 0; transform: translateX(-12px); }
  .main-nav.mobile-open a { animation: navItemIn 360ms forwards cubic-bezier(.2,.9,.2,1); }
  .main-nav.mobile-open a:nth-of-type(1) { animation-delay: 0.06s }
  .main-nav.mobile-open a:nth-of-type(2) { animation-delay: 0.12s }
  .main-nav.mobile-open a:nth-of-type(3) { animation-delay: 0.18s }
  .main-nav.mobile-open a:nth-of-type(4) { animation-delay: 0.24s }
  .main-nav.mobile-open a:nth-of-type(5) { animation-delay: 0.30s }
  .main-nav.mobile-open a:nth-of-type(6) { animation-delay: 0.36s }

  @keyframes navItemIn { to { opacity: 1; transform: translateX(0); } }
  .main-nav.mobile-open { transform: translateX(0); }
  .main-nav a { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 1.25rem; font-size: 1.12rem; border-radius: 0; background: transparent; color: #125ea8; text-decoration: none; }
  .main-nav a .nav-icon { display:inline-flex; width:22px; height:22px; align-items:center; justify-content:center; }
  .main-nav a .nav-text { display:inline-block; font-weight:600; }
  .main-nav a.active { margin-left: 0.75rem; margin-right: 0.75rem; background: linear-gradient(90deg, #2e7d32, #1976d2); color: #fff; padding-left: 1.1rem; padding-right: 1.1rem; border-radius: 8px; box-shadow: 0 6px 18px rgba(25,118,210,0.12); }
  .nav-close {
    position: absolute;
    right: 0.5rem;
    top: 0.6rem;
    background: transparent;
    border: none;
    font-size: 1.45rem;
    padding: 0.45rem 0.6rem;
    cursor: pointer;
  }
  main { padding-top: 3.5rem; }
}
</style>
